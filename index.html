<!DOCTYPE html>
<html lang="ru">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 110 100'><text y='.9em' font-size='90'>😋</text></svg>">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Picker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cell-size: 4.3rem;
    --emoji-size: 3rem;
  }

  body {
    background: #ffffff;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body.dark {
    background: #1a1a1a;
    color: #f0f0f0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #ffffff;
    border-bottom: 1px solid #e0e0e000;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  body.dark header {
    background: #1a1a1a;
    border-bottom-color: #33333300;
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    color: #666666;
    letter-spacing: 0.03em;
    flex-shrink: 0;
  }
  body.dark h1 { color: #999999; }

  /* Size presets */
  #size-presets {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    justify-content: center;
  }

  .size-btn {
    background: none;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    cursor: pointer;
    color: #888888;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 0;
    width: 36px;
    min-width: 36px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    font-family: inherit;
    transition: background 0.12s, color 0.12s;
    white-space: nowrap;
    text-align: center;
  }
  body.dark .size-btn {
    border-color: #333333;
    color: #666666;
  }
  .size-btn:hover {
    background: #f5f5f5;
    color: #444444;
    border-color: #cccccc;
  }
  body.dark .size-btn:hover {
    background: #242424;
    color: #aaaaaa;
    border-color: #444444;
  }
  .size-btn.active {
    background: rgb(39, 131, 222);
    border-color: rgb(39, 131, 222);
    color: #ffffff;
  }
  body.dark .size-btn.active {
    background: rgb(39, 131, 222);
    border-color: rgb(39, 131, 222);
    color: #ffffff;
  }

  #theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  body.dark #theme-toggle { color: #f0f0f0; }
  #theme-toggle:hover { background: #f5f5f5; }
  body.dark #theme-toggle:hover { background: #242424; }

  main {
    padding: 90px 19px 90px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .category {
    margin-bottom: 100px;
  }

  .category-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #666666;
    margin-bottom: 8px;
  }
  body.dark .category-title { color: #999999; }

  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
  }

  .emoji-cell {
    width: var(--cell-size);
    height: var(--cell-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--emoji-size);
    cursor: pointer;
    border-radius: 8px;
    user-select: none;
    line-height: 1;
  }
  .emoji-cell:hover { background: rgb(39, 131, 222); }

  /* Invisible trigger zone — covers entire dash column */
  #nav-trigger {
    position: fixed;
    right: 20px;
    width: 40px;
    z-index: 99;
  }

  /* Nav panel — sits on top of trigger, pointer-events only when open */
  #nav-panel {
    position: fixed;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 0;
    pointer-events: none;
  }
  #nav-panel.open {
    pointer-events: auto;
  }

  /* Background card */
  #nav-card {
    position: absolute;
    inset: -6px 0;
    background: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease;
    z-index: -1;
  }
  body.dark #nav-card {
    background: #242424;
    border-color: #333333;
    box-shadow: -4px 0 16px rgba(0,0,0,0.4);
  }
  #nav-panel.open #nav-card { opacity: 1; }

  .nav-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    padding: 6px 16px 6px 14px;
    cursor: pointer;
    border-radius: 6px 0 0 6px;
  }

  #nav-panel { width: 170px; }

  .nav-label {
    font-size: 14px;
    font-weight: 400;
    white-space: nowrap;
    color: #888888;
    opacity: 0;
    width: 0;
    overflow: hidden;
    flex: 1;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: opacity 0.22s ease, width 0.22s ease, color 0.15s ease;
    pointer-events: none;
  }
  .nav-label-emoji {
    font-size: 14px;
    line-height: 1;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0px 14px 0px 8px;
  }
  .nav-label-text {
    line-height: 1.4;
    display: inline-flex;
    align-items: center;
  }
  #nav-panel.open .nav-label {
    opacity: 1;
    width: auto;
    pointer-events: auto;
  }

  .nav-line {
    width: 10px;
    height: 2px;
    border-radius: 1px;
    background: #888888;
    flex-shrink: 0;
    transition: background 0.15s ease;
  }

  /* Active state */
  .nav-row.active .nav-label { color: rgb(39, 131, 222); font-weight: 500; }
  .nav-row.active .nav-line  { background: rgb(39, 131, 222); }

  /* Hovered — darker in light, lighter in dark */
  .nav-row.hovered:not(.active) .nav-label { color: #333333; }
  .nav-row.hovered:not(.active) .nav-line  { background: #333333; }
  body.dark .nav-row.hovered:not(.active) .nav-label { color: #ffffff; }
  body.dark .nav-row.hovered:not(.active) .nav-line  { background: #ffffff; }

  /* Loader overlay */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    /*transition: opacity 0.1s ease;*/
  }
  #loader.visible {
    opacity: 1;
    pointer-events: auto;
  }
  /* ===== ЛОАДЕР — настройки ===== */
  .loader-spinner {
    width: 28px;                              /* размер спиннера */
    height: 28px;
    border: 3px solid rgba(0,0,0,0.08);               /* толщина и цвет трека */
    border-top-color: rgb(39, 131, 222);     /* цвет активной дуги */
    border-radius: 50%;
    animation: spin 0.6s linear infinite;    /* скорость: меньше = быстрее */
  }
  body.dark .loader-spinner {
    border-color: rgba(255,255,255,0.12);                   /* трек в тёмной теме */
    border-top-color: rgb(39, 131, 222);     /* активная дуга в тёмной теме */
  }
  /* ============================== */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Favourites ── */

  /* Star badge — appears on right-click */
  #fav-badge {
    position: fixed;
    width: 34px;
    height: 34px;
    background: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: none;
    visibility: hidden;
    z-index: 200;
    transition: transform 0.12s ease;
  }
  body.dark #fav-badge {
    background: #2a2a2a;
    border-color: #444444;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  #fav-badge.open {
    pointer-events: auto;
    visibility: visible;
    animation: fav-badge-pop 0.14s cubic-bezier(0.25, 0, 0, 1.4) forwards;
  }
  @keyframes fav-badge-pop {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  #fav-badge svg {
    width: 15px; height: 15px;
    stroke: #aaaaaa;
    fill: none;
    flex-shrink: 0;
    pointer-events: none;
    transition: stroke 0.1s, fill 0.1s;
  }
  #fav-badge.is-fav svg {
    stroke: #f5c418;
    fill: #f5c418;
  }
  #fav-badge:hover { transform: scale(1.08); }

  /* Drag states for fav cells */
  .emoji-cell.fav-dragging {
    opacity: 0.3;
    cursor: grabbing !important;
  }
  .emoji-cell.fav-drag-over {
    background: rgb(39, 131, 222);
    border-radius: 8px;
  }
  .emoji-grid.fav-is-dragging .emoji-cell:not(.fav-dragging) {
    cursor: grab;
  }

  /* Fav category subtle indicator */
  .category-title.fav-title {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .category-title.fav-title svg {
    width: 10px; height: 10px;
    stroke: #f5c418;
    fill: #f5c418;
    flex-shrink: 0;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #1a1a1a;
    color: #ffffff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
    white-space: nowrap;
  }
  body.dark #toast { background: #f0f0f0; color: #1a1a1a; }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  /* ── Sync button ── */
  #sync-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    flex-shrink: 0;
  }
  body.dark #sync-btn { color: #f0f0f0; }
  #sync-btn:hover { background: #f5f5f5; }
  body.dark #sync-btn:hover { background: #242424; }
  #sync-btn svg { width: 18px; height: 18px; }
  #sync-btn.syncing svg { animation: spin-ccw 0.8s linear infinite; }
  @keyframes spin-ccw { to { transform: rotate(-360deg); } }

  /* ── Sync modal ── */
  #sync-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 300;
    backdrop-filter: blur(2px);
  }
  #sync-overlay.open { display: block; }

  #sync-modal {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    z-index: 301;
    background: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 18px;
    padding: 24px 24px 20px;
    width: 340px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    transition: transform 0.15s ease, opacity 0.15s ease;
    opacity: 0;
    /* нужен для position:absolute у дочерних элементов */
    isolation: isolate;
    overflow: visible;
  }
  body.dark #sync-modal {
    background: #1b1b1b;
    border-color: #333333;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  #sync-modal.open {
    display: block;
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  #sync-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  body.dark #sync-title { color: #f0f0f0; }

  #sync-desc {
    font-size: 12px;
    color: #888888;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  body.dark #sync-desc { color: #666666; }

  #sync-token-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  #sync-token-input {
    flex: 1;
    height: 34px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 0 10px;
    font-size: 13px;
    font-family: inherit;
    background: #f7f7f7;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.12s;
  }
  body.dark #sync-token-input {
    background: #2a2a2a;
    border-color: #383838;
    color: #f0f0f0;
  }
  #sync-token-input:focus { border-color: rgb(39,131,222); }
  #sync-token-eye {
    width: 34px; height: 34px;
    background: #f7f7f7;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #888888;
  }
  body.dark #sync-token-eye { background: #2a2a2a; border-color: #383838; color: #666; }
  #sync-token-eye svg { width: 14px; height: 14px; pointer-events: none; }

  #sync-token-hint {
    font-size: 11px;
    color: #aaaaaa;
    margin-bottom: 16px;
  }
  #sync-token-hint a { color: rgb(39,131,222); text-decoration: none; }
  #sync-token-hint a:hover { text-decoration: underline; }

  #sync-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .sync-action-btn {
    flex: 1;
    height: 34px;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    background: #f7f7f7;
    color: #444444;
    transition: background 0.1s, color 0.1s;
  }
  body.dark .sync-action-btn {
    background: #2a2a2a;
    border-color: #383838;
    color: #aaaaaa;
  }
  .sync-action-btn:hover { background: #eeeeee; }
  body.dark .sync-action-btn:hover { background: #333333; }
  .sync-action-btn.primary {
    background: rgb(39,131,222);
    border-color: rgb(39,131,222);
    color: #ffffff;
  }
  .sync-action-btn.primary:hover { background: rgb(30,115,200); }

  #sync-status {
    font-size: 12px;
    color: #888888;
    text-align: center;
    overflow: hidden;
    max-height: 0;
    margin-bottom: 0;
    opacity: 0;
    transition: max-height 0.2s ease, margin-bottom 0.2s ease, opacity 0.2s ease;
  }
  #sync-status.visible {
    max-height: 40px;
    margin-bottom: 10px;
    opacity: 1;
  }
  #sync-status.ok  { color: #4caf50; }
  #sync-status.err { color: #e53935; }

  #sync-close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 28px;
    height: 28px;
    background: none;
    border: none;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #bbbbbb;
    padding: 0;
    transition: background 0.12s, color 0.12s;
  }
  body.dark #sync-close-btn { color: #555555; }
  #sync-close-btn:hover { background: #f0f0f0; color: #555555; }
  body.dark #sync-close-btn:hover { background: #2a2a2a; color: #aaaaaa; }

  /* Conflict panel */
  #sync-conflict {
    display: none;
    margin-bottom: 20px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    overflow: hidden;
  }
  body.dark #sync-conflict { border-color: #383838; }
  #sync-conflict.open { display: block; }
  #sync-conflict-title {
    font-size: 11px;
    font-weight: 600;
    color: #888888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 12px 6px;
    background: #f7f7f7;
    border-bottom: 1px solid #e0e0e0;
  }
  body.dark #sync-conflict-title { background: #2a2a2a; border-color: #383838; color: #666; }
  #sync-conflict-counts {
    font-size: 12px;
    color: #666;
    padding: 10px 12px 10px;
    line-height: 2;
  }
  body.dark #sync-conflict-counts { color: #888; }
  #sync-conflict-counts b { color: #1a1a1a; }
  body.dark #sync-conflict-counts b { color: #f0f0f0; }
  #sync-conflict-btns {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 10px 10px;
  }
  .conflict-btn {
    flex: 1;
    height: 30px;
    border: 1px solid #e0e0e0;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    background: #f7f7f7;
    color: #444444;
    transition: background 0.1s, color 0.1s;
    white-space: nowrap;
  }
  body.dark .conflict-btn { background: #2a2a2a; border-color: #383838; color: #aaaaaa; }
  .conflict-btn:hover { background: #eeeeee; }
  body.dark .conflict-btn:hover { background: #333333; }
  .conflict-btn.primary {
    background: rgb(39,131,222);
    border-color: rgb(39,131,222);
    color: #fff;
  }
  .conflict-btn.primary:hover { background: rgb(30,115,200); }
</style>
</head>
<body>

<header>
  <div style="width: 84px; flex-shrink: 0;"></div>
  <div id="size-presets">
    <button class="size-btn" data-cell="2.4rem" data-emoji="1.6rem">S</button>
    <button class="size-btn" data-cell="3rem" data-emoji="2.1rem">M</button>
    <button class="size-btn active" data-cell="4.3rem" data-emoji="3rem">L</button>
  </div>
  <button id="theme-toggle" title="Переключить тему" aria-label="Переключить тему"></button>
  <button id="sync-btn" title="Синхронизация избранного" aria-label="Синхронизация"></button>
</header>

<!-- Sync modal -->
<div id="sync-overlay"></div>
<div id="sync-modal">
  <button id="sync-close-btn" title="Закрыть"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
  <div id="sync-title">Синхронизация ⭐️</div>
  <div id="sync-desc">Сохраняй избранное в GitHub Gist — доступно на любом устройстве.<br>Токен хранится только в этом браузере.</div>
  <div id="sync-token-row">
    <input id="sync-token-input" type="password" placeholder="GitHub Personal Access Token" autocomplete="off" spellcheck="false">
    <button id="sync-token-eye" tabindex="-1" title="Показать/скрыть токен"></button>
  </div>
  <div id="sync-token-hint">Нужны права <b>gist</b>. <a href="https://github.com/settings/tokens/new?scopes=gist&description=Emoji+Picker+Sync" target="_blank">Создать токен →</a></div>
  <div id="sync-status"></div>
  <div id="sync-actions">
    <button class="sync-action-btn primary" id="sync-do-btn">🔄 Синхронизировать</button>
  </div>
</div>

<main id="main"></main>

<div id="loader"><div class="loader-spinner"></div></div>
<div id="toast"></div>

<div id="fav-badge"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>

<div id="nav-trigger"></div>
<div id="nav-panel">
  <div id="nav-card"></div>
</div>

<script>

// Size presets
const root = document.documentElement;
const loader = document.getElementById('loader');

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('active')) return;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loader.classList.add('visible');
    setTimeout(() => {
      root.style.setProperty('--cell-size', btn.dataset.cell);
      root.style.setProperty('--emoji-size', btn.dataset.emoji);
      requestAnimationFrame(() => { loader.classList.remove('visible'); });
    }, 0);
  });
});

// ── Favourites state ─────────────────────────────────────────────────────────
// Storage format (tombstone):
//   { "😂": 1700000500, "🔥": -1700001000 }
//   positive timestamp  = active favourite (added at that time)
//   negative timestamp  = intentionally deleted (tombstone)
//   order array stored separately so drag-reorder works without touching timestamps
const FAV_KEY       = 'emoji-picker-favs';       // tombstone map
const FAV_ORDER_KEY = 'emoji-picker-favs-order';  // ordered array of active emojis

function loadTombstoneMap() {
  try {
    const raw = localStorage.getItem(FAV_KEY);
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    // Migration: if old format (plain array), convert to tombstone map
    if (Array.isArray(parsed)) {
      const now = Date.now();
      const map = {};
      parsed.forEach(em => { map[em] = now; });
      return map;
    }
    return parsed;
  } catch { return {}; }
}

const favState = {
  _map: loadTombstoneMap(),   // { emoji: timestamp }  positive=active, negative=deleted
  _order: (() => {
    const raw = JSON.parse(localStorage.getItem(FAV_ORDER_KEY) || 'null');
    if (!Array.isArray(raw)) return null;
    // Дедупликация на случай если дубликаты уже сохранены
    return [...new Set(raw)];
  })(),

  // Active list derived from map (in display order)
  get emojis() {
    const active = new Set(Object.entries(this._map).filter(([,v]) => v > 0).map(([k]) => k));
    if (this._order) {
      // Фильтруем order, оставляя только активные — дубликаты убираем через seen
      const seen = new Set();
      const ordered = this._order.filter(em => {
        if (!active.has(em) || seen.has(em)) return false;
        seen.add(em);
        return true;
      });
      // Добавляем активные эмодзи которых ещё нет в order (новые добавления)
      active.forEach(em => { if (!seen.has(em)) ordered.unshift(em); });
      return ordered;
    }
    return [...active];
  },

  // Setter used by legacy sync code (applyResolution) — accepts plain array
  set emojis(arr) {
    const now = Date.now();
    // Mark everything currently active as deleted
    Object.keys(this._map).forEach(em => {
      if (this._map[em] > 0) this._map[em] = -Math.abs(this._map[em]);
    });
    // Add all items from new array
    arr.forEach(em => { this._map[em] = now; });
    this._order = [...arr];
    this.save();
  },

  save() {
    localStorage.setItem(FAV_KEY, JSON.stringify(this._map));
    localStorage.setItem(FAV_ORDER_KEY, JSON.stringify(this.emojis));
  },

  has(em) { return (this._map[em] ?? 0) > 0; },

  add(em) {
    if (!this.has(em)) {
      this._map[em] = Date.now();
      const ord = this.emojis;
      ord.unshift(em);
      this._order = ord;
      this.save();
      scheduleAutoSync();
    }
  },

  remove(em) {
    if (this.has(em)) {
      this._map[em] = -Date.now();
      this._order = this.emojis;
      this.save();
      scheduleAutoSync();
    }
  },

  toggle(em) { this.has(em) ? this.remove(em) : this.add(em); },

  move(fromIdx, toIdx) {
    if (fromIdx === toIdx) return;
    const ord = this.emojis;
    const [item] = ord.splice(fromIdx, 1);
    ord.splice(toIdx, 0, item);
    this._order = ord;
    this.save();
    scheduleAutoSync();
  },

  // Merge two tombstone maps: for each emoji, keep the entry with the latest |timestamp|
  mergeWith(remoteMap) {
    const result = { ...this._map };
    Object.entries(remoteMap).forEach(([em, ts]) => {
      const localTs  = result[em] ?? 0;
      if (Math.abs(ts) > Math.abs(localTs)) result[em] = ts;
    });
    return result;
  }
};

// ── Nav panel ────────────────────────────────────────────────────────────────
const mainEl = document.getElementById('main');
const navPanel = document.getElementById('nav-panel');
const navTrigger = document.getElementById('nav-trigger');

function positionNavPanel() {
  const h = navPanel.offsetHeight;
  const top = Math.round((window.innerHeight - h) / 2);
  navPanel.style.top = top + 'px';
  navTrigger.style.top = top + 'px';
  navTrigger.style.height = h + 'px';
}
window.addEventListener('resize', positionNavPanel);

const navRows = [];
let manualActiveIdx = null;

const CAT_EMOJI = {
  "Избранное":   "⭐️",
  "Эмоции":      "😀",
  "Части тела":  "👋",
  "Люди":        "👨‍👩‍👦",
  "Одежда":      "👗",
  "Природа":     "🌿",
  "Еда":         "🍕",
  "Активности":  "⚽️",
  "Путешествия": "✈️",
  "Предметы":    "📦",
  "Символы":     "❤️",
  "Флаги":       "🏳️"
};

// Nav includes fav + all cats
let allNavCats = [];   // array of {name, isFav}
let categoryEls = [];  // DOM sections in order

function buildNav() {
  // Запоминаем текущий активный индекс до пересборки
  const prevActiveIdx = navRows.findIndex(r => r.classList.contains('active'));
  const prevCats = [...allNavCats];

  // Remove old nav rows (keep #nav-card)
  navRows.forEach(r => r.remove());
  navRows.length = 0;

  const hadFav = prevCats.length > 0 && prevCats[0].isFav;
  allNavCats = [
    ...(favState.emojis.length > 0 ? [{ name: 'Избранное', isFav: true }] : []),
    ...EMOJIS.map(c => ({ name: c.name, isFav: false }))
  ];
  const hasFav = allNavCats.length > 0 && allNavCats[0].isFav;

  // Пересчитываем активный индекс с учётом появления/исчезновения «Избранного»
  let targetActiveIdx = 0;
  if (prevActiveIdx >= 0) {
    if (!hadFav && hasFav) {
      // Избранное появилось — все индексы сдвинулись на +1
      targetActiveIdx = prevActiveIdx + 1;
    } else if (hadFav && !hasFav) {
      // Избранное исчезло — сдвиг на -1, но не ниже 0
      targetActiveIdx = Math.max(0, prevActiveIdx - 1);
    } else {
      targetActiveIdx = prevActiveIdx;
    }
  }

  allNavCats.forEach((cat, i) => {
    const row = document.createElement('div');
    row.className = 'nav-row' + (i === targetActiveIdx ? ' active' : '');

    const label = document.createElement('div');
    label.className = 'nav-label';
    const emo = CAT_EMOJI[cat.name] || '';
    if (emo) {
      const emoSpan = document.createElement('span');
      emoSpan.className = 'nav-label-emoji';
      emoSpan.textContent = emo;
      label.appendChild(emoSpan);
    }
    const textSpan = document.createElement('span');
    textSpan.className = 'nav-label-text';
    textSpan.textContent = cat.name;
    label.appendChild(textSpan);

    const line = document.createElement('div');
    line.className = 'nav-line';

    row.appendChild(label);
    row.appendChild(line);
    navPanel.appendChild(row);
    navRows.push(row);

    row.addEventListener('mouseenter', () => {
      navRows.forEach((r, j) => r.classList.toggle('hovered', j === i));
    });
    row.addEventListener('mouseleave', () => { row.classList.remove('hovered'); });
    row.addEventListener('click', () => {
      manualActiveIdx = i;
      setActive(i);
      const target = document.getElementById('cat-' + cat.name);
      if (target) {
        const headerH = document.querySelector('header').offsetHeight;
        const top = target.getBoundingClientRect().top + window.scrollY - headerH - 12;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    });
  });

  positionNavPanel();
}

navPanel.addEventListener('mouseleave', (e) => {
  if (e.relatedTarget === navTrigger) return;
  navRows.forEach(r => r.classList.remove('hovered'));
  navPanel.classList.remove('open');
});
navTrigger.addEventListener('mouseenter', () => { navPanel.classList.add('open'); });
navTrigger.addEventListener('mouseleave', (e) => {
  if (navPanel.contains(e.relatedTarget)) return;
  navRows.forEach(r => r.classList.remove('hovered'));
  navPanel.classList.remove('open');
});

function setActive(idx) {
  navRows.forEach((r, i) => r.classList.toggle('active', i === idx));
}

window.addEventListener('scroll', () => {
  if (manualActiveIdx !== null) {
    const scrollIdx = getScrollActive();
    if (scrollIdx === manualActiveIdx) manualActiveIdx = null;
    else return;
  }
  setActive(getScrollActive());
}, { passive: true });

function getScrollActive() {
  const mid = window.scrollY + window.innerHeight / 2;
  let activeIdx = 0;
  categoryEls.forEach((el, i) => {
    if (el.offsetTop <= mid) activeIdx = i;
  });
  return activeIdx;
}

// ── Build grid ────────────────────────────────────────────────────────────────
function buildGrid() {
  mainEl.innerHTML = '';
  categoryEls = [];

  // Favourites section (only if non-empty)
  if (favState.emojis.length > 0) {
    const sec = buildSection('Избранное', favState.emojis, true);
    mainEl.appendChild(sec);
    categoryEls.push(sec);
  }

  EMOJIS.forEach(cat => {
    const sec = buildSection(cat.name, cat.emojis, false);
    mainEl.appendChild(sec);
    categoryEls.push(sec);
  });
}

function buildSection(name, emojis, isFav) {
  const section = document.createElement('div');
  section.className = 'category';
  section.id = 'cat-' + name;

  const title = document.createElement('div');
  title.className = 'category-title' + (isFav ? ' fav-title' : '');
  if (isFav) {
    title.innerHTML = `<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    title.appendChild(document.createTextNode(name));
  } else {
    title.textContent = name;
  }
  section.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'emoji-grid';
  section.appendChild(grid);

  emojis.forEach(emoji => {
    grid.appendChild(makeCell(emoji, isFav, grid));
  });

  return section;
}

function makeCell(emoji, isFav, grid) {
  const cell = document.createElement('div');
  cell.className = 'emoji-cell';
  cell.textContent = emoji;
  cell.title = emoji;
  if (isFav) cell.dataset.favEmoji = emoji;

  cell.addEventListener('click', () => copyEmoji(emoji));
  cell.addEventListener('contextmenu', e => {
    e.preventDefault();
    showBadge(cell, emoji);
  });

  if (isFav) {
    // Pointer drag to reorder
    cell.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      e.preventDefault();
      const dx0 = e.clientX, dy0 = e.clientY;
      function onMove(mv) {
        if (Math.abs(mv.clientX - dx0) > 5 || Math.abs(mv.clientY - dy0) > 5) {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          startFavDrag(cell, emoji, grid, mv.clientX, mv.clientY);
        }
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  return cell;
}

// ── Fav drag-and-drop ─────────────────────────────────────────────────────────
function startFavDrag(btn, emoji, grid, startX, startY) {
  hideBadge();
  const rect = btn.getBoundingClientRect();
  const ghost = document.createElement('div');
  ghost.textContent = emoji;
  const cellSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell-size')) * 16;
  ghost.style.cssText = `position:fixed;width:${rect.width}px;height:${rect.height}px;font-size:${rect.height * 0.65}px;display:flex;align-items:center;justify-content:center;background:${dark ? '#3a3a3a' : '#e8e8e8'};border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.25);pointer-events:none;z-index:9999;opacity:.85;left:${rect.left}px;top:${rect.top}px`;
  document.body.appendChild(ghost);

  btn.classList.add('fav-dragging');
  grid.classList.add('fav-is-dragging');
  const offX = startX - rect.left, offY = startY - rect.top;
  let lastOver = null;

  function onMove(e) {
    ghost.style.left = (e.clientX - offX) + 'px';
    ghost.style.top  = (e.clientY - offY) + 'px';
    const over = document.elementFromPoint(e.clientX, e.clientY)?.closest('[data-fav-emoji]');
    if (lastOver && lastOver !== over) lastOver.classList.remove('fav-drag-over');
    if (over && over !== btn) { over.classList.add('fav-drag-over'); lastOver = over; }
    else lastOver = null;
  }

  function onUp(e) {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    ghost.remove();
    btn.classList.remove('fav-dragging');
    grid.classList.remove('fav-is-dragging');
    if (lastOver) lastOver.classList.remove('fav-drag-over');

    const target = document.elementsFromPoint(e.clientX, e.clientY)
      .reduce((f, el) => f || el.closest('[data-fav-emoji]'), null);
    if (target && target !== btn) {
      const si = favState.emojis.indexOf(emoji);
      const ti = favState.emojis.indexOf(target.dataset.favEmoji);
      if (si !== -1 && ti !== -1 && si !== ti) {
        favState.move(si, ti);
        rebuild();
      }
    }
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ── Star badge ────────────────────────────────────────────────────────────────
const favBadge = document.getElementById('fav-badge');
let badgeAnchor = null, badgeEmoji = null, badgeHideTimer = null;

function hideBadge() {
  clearTimeout(badgeHideTimer);
  favBadge.classList.remove('open');
  badgeAnchor = null;
  badgeEmoji = null;
}

function showBadge(btn, emoji) {
  clearTimeout(badgeHideTimer);
  if (badgeAnchor === btn) { hideBadge(); return; }
  badgeAnchor = btn;
  badgeEmoji = emoji;
  favBadge.classList.toggle('is-fav', favState.has(emoji));

  // Position: centred above the cell
  const bRect = btn.getBoundingClientRect();
  const bw = favBadge.offsetWidth || 34;
  const bh = favBadge.offsetHeight || 34;
  let left = bRect.left + bRect.width / 2 - bw / 2;
  let top  = bRect.top - bh - 6;
  // Clamp to viewport
  left = Math.max(6, Math.min(left, window.innerWidth - bw - 6));
  if (top < 6) top = bRect.bottom + 6;
  favBadge.style.left = left + 'px';
  favBadge.style.top  = top  + 'px';

  favBadge.classList.remove('open');
  void favBadge.offsetWidth; // reflow to restart animation
  favBadge.classList.add('open');
}

favBadge.addEventListener('click', e => {
  e.stopPropagation();
  if (!badgeEmoji) return;
  favState.toggle(badgeEmoji);
  favBadge.classList.toggle('is-fav', favState.has(badgeEmoji));
  // Small delay so the star state change is visible before badge disappears
  setTimeout(() => {
    hideBadge();
    rebuild();
  }, 320);
});

// Hide badge when clicking outside
document.addEventListener('mousedown', e => {
  if (badgeAnchor && !favBadge.contains(e.target)) hideBadge();
});

// Hide badge on scroll immediately
window.addEventListener('scroll', () => { if (badgeAnchor) hideBadge(); }, { passive: true });

// ── Rebuild (nav + grid) ──────────────────────────────────────────────────────
function rebuild() {
  buildNav();
  buildGrid();
  positionNavPanel();
}

const GIST_KEY        = 'emoji-picker-gist-token';
const GIST_ID_KEY     = 'emoji-picker-gist-id';
const GIST_SYNCED_KEY = 'emoji-picker-ever-synced'; // флаг: браузер уже синхронизировался хотя бы раз
const GIST_FILENAME   = 'emoji-picker-favs.json';

const syncBtn      = document.getElementById('sync-btn');

// Load saved token
syncInput.value = localStorage.getItem(GIST_KEY) || '';

function openSyncModal() {

  void syncModal.offsetWidth;

function setSyncStatus(msg, type = '') {
  syncStatus.textContent = msg;
  syncStatus.className = type;
  syncStatus.classList.toggle('visible', msg.length > 0);
}

function hideConflict() { /* conflict UI removed — merge is automatic */ }

function getToken() {
  const t = syncInput.value.trim();
  if (t) localStorage.setItem(GIST_KEY, t);
  return t;
}

async function gistRequest(method, path, body) {
  const token = getToken();
  if (!token) { setSyncStatus('Введи токен', 'err'); return null; }
  const res = await fetch('https://api.github.com' + path, {
    method,
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const e = new Error(err.message || res.statusText);
    e.status = res.status;
    throw e;
  }
  return res.json();
}

// Conflict UI removed — tombstone merge is automatic, no user prompt needed

async function syncFavs() {
  hideConflict();
  setSyncStatus('Синхронизирую…');
  syncDoBtn.disabled = true;
  syncBtn.classList.add('syncing');
  try {
    let gistId = localStorage.getItem(GIST_ID_KEY);

    // Try to find existing gist if no id saved
    if (!gistId) {
      const list = await gistRequest('GET', '/gists?per_page=100');
      if (!list) return;
      const found = list.find(g => g.files && g.files[GIST_FILENAME]);
      if (found) {
        gistId = found.id;
        localStorage.setItem(GIST_ID_KEY, gistId);
      }
    }

    if (gistId) {
      let data;
      try { data = await gistRequest('GET', '/gists/' + gistId); }
      catch { gistId = null; }

      if (data) {
        const raw = data.files?.[GIST_FILENAME]?.content;
        if (raw) {
          const parsed = JSON.parse(raw);

          // Support both old format (favEmojis array) and new (tombstoneMap)
          let remoteMap;
          if (parsed.tombstoneMap && typeof parsed.tombstoneMap === 'object' && !Array.isArray(parsed.tombstoneMap)) {
            remoteMap = parsed.tombstoneMap;
          } else if (Array.isArray(parsed.favEmojis)) {
            // Migrate old format: timestamp=1 so any local tombstone (ts > 1) wins
            remoteMap = {};
            parsed.favEmojis.forEach(em => { remoteMap[em] = 1; });
          }

          if (remoteMap) {
            const everSynced = !!localStorage.getItem(GIST_SYNCED_KEY);

            let mergedMap;
            if (!everSynced) {
              mergedMap = { ...remoteMap };
              Object.entries(favState._map).forEach(([em, ts]) => {
                if (ts > 0) {
                  const remoteTs = mergedMap[em] ?? 0;
                  if (ts > Math.abs(remoteTs)) mergedMap[em] = ts;
                }
              });
            } else {
              mergedMap = favState.mergeWith(remoteMap);
            }

            // ── Восстанавливаем порядок ──────────────────────────────────────
            // Берём текущий локальный порядок как основу, затем добавляем
            // в конец эмодзи которые есть в облаке но отсутствуют локально.
            const remoteOrder = Array.isArray(parsed.order) ? parsed.order : [];
            const localOrder  = favState.emojis; // текущий порядок до merge
            const activeInMerge = new Set(
              Object.entries(mergedMap).filter(([,v]) => v > 0).map(([k]) => k)
            );
            // Начинаем с локального порядка (фильтруем удалённые)
            const seen = new Set();
            const mergedOrder = localOrder.filter(em => {
              if (!activeInMerge.has(em) || seen.has(em)) return false;
              seen.add(em); return true;
            });
            // Дописываем в конец то что пришло из облака и ещё не в списке
            remoteOrder.forEach(em => {
              if (activeInMerge.has(em) && !seen.has(em)) {
                mergedOrder.push(em);
                seen.add(em);
              }
            });
            // Всё остальное активное (ни там ни там в order) — в конец
            activeInMerge.forEach(em => {
              if (!seen.has(em)) mergedOrder.push(em);
            });

            favState._map   = mergedMap;
            favState._order = mergedOrder;
            favState.save();
            rebuild();

            // Push merged state back to cloud
            const activeCount = favState.emojis.length;
            const content = JSON.stringify({ tombstoneMap: mergedMap, order: mergedOrder }, null, 2);
            await gistRequest('PATCH', '/gists/' + gistId, { files: { [GIST_FILENAME]: { content } } });
            localStorage.setItem(GIST_SYNCED_KEY, '1');
            pendingChanges = false;
            setSyncStatus('✓ Синхронизировано (' + activeCount + ' эмодзи)', 'ok');
            return;
          }
        }
      }
    }

    // No remote data yet — push local tombstone map
    const content = JSON.stringify({ tombstoneMap: favState._map, order: favState.emojis }, null, 2);
    const fileObj = { [GIST_FILENAME]: { content } };
    if (gistId) {
      await gistRequest('PATCH', '/gists/' + gistId, { files: fileObj });
    } else {
      const created = await gistRequest('POST', '/gists', {
        description: 'Emoji Picker — избранное',
        public: false,
        files: fileObj
      });
      if (!created) return;
      localStorage.setItem(GIST_ID_KEY, created.id);
    }
    setSyncStatus('✓ Сохранено в облако (' + favState.emojis.length + ' эмодзи)', 'ok');
    localStorage.setItem(GIST_SYNCED_KEY, '1');
    pendingChanges = false;

  } catch (e) {
    if (!e.status || e.status !== 403 || !e.message.includes('rate limit')) {
      setSyncStatus('Ошибка: ' + e.message, 'err');
    }
    // Если есть несинхронизированные изменения — повторим через 10 сек
    if (pendingChanges) {
      const token = localStorage.getItem(GIST_KEY);
      const everSynced = localStorage.getItem(GIST_SYNCED_KEY);
      if (token && everSynced) {
        clearTimeout(autoSyncTimer);
        autoSyncTimer = setTimeout(() => { if (pendingChanges) syncFavs(); }, 10_000);
      }
    }
  } finally {
    syncDoBtn.disabled = false;
    // Снимаем класс ровно на границе оборота — через событие animationiteration,
    // которое браузер стреляет в конце каждого полного круга.
    const svgEl = syncBtn.querySelector('svg');
    if (svgEl && syncBtn.classList.contains('syncing')) {
      svgEl.addEventListener('animationiteration', () => {
        syncBtn.classList.remove('syncing');
      }, { once: true });
    } else {
      syncBtn.classList.remove('syncing');
    }
  }
}

syncDoBtn.addEventListener('click', () => {
  pendingChanges = true;
  syncFavs();
});

// ── Авто-синхронизация ────────────────────────────────────────────────────────
// leading + trailing debounce:
//   - первое изменение запускает sync сразу
//   - быстрые клики подряд — ждём паузу, потом один финальный sync
// pendingChanges — флаг что есть несинхронизированные изменения;
//   снимается только после успешного sync, поэтому ошибка сети не потеряет данные

let autoSyncTimer  = null;
let isSyncLeading  = true;  // следующий вызов — "leading" (мгновенный)
let pendingChanges = false;

const DEBOUNCE_WAIT = 3000; // пауза после последнего изменения

function scheduleAutoSync() {
  const token = localStorage.getItem(GIST_KEY);
  const everSynced = localStorage.getItem(GIST_SYNCED_KEY);
  if (!token || !everSynced) return;

  pendingChanges = true;
  clearTimeout(autoSyncTimer);

  if (isSyncLeading) {
    // Первое изменение — запускаем сразу
    isSyncLeading = false;
    syncFavs();
    // После паузы сбрасываем leading, чтобы следующая "волна" тоже начиналась быстро
    autoSyncTimer = setTimeout(() => { isSyncLeading = true; }, DEBOUNCE_WAIT);
  } else {
    // Идут быстрые изменения — откладываем trailing sync
    autoSyncTimer = setTimeout(() => {
      isSyncLeading = true;
      if (pendingChanges) syncFavs();
    }, DEBOUNCE_WAIT);
  }
}
</script>
